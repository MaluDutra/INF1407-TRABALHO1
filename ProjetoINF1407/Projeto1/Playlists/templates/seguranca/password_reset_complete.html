{% extends 'seguranca/base.html' %}
{% load static %}

{% block titulo %}Senha Criada{% endblock %}

{% block css_extra %}
<link rel="stylesheet" href="{% static 'css/auth.css' %}">
{% endblock %}

{% block conteudo %}
<section class="auth-section">
    <div class="auth-card auth-card-login">
        <div class="auth-icon-box">✅</div>

        <h2 class="auth-title">Senha Criada</h2>
        <p class="auth-subtitle">
            Sua senha foi redefinida com sucesso
        </p>

        <p class="auth-footer-text">
            Clique <a href="{%url 'login'%}?next={%url 'homepage'%}">aqui</a> para fazer login.
        </p>
    </div>
</section>

{% endblock %}
