{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block titulo %}{% endblock %}</title>

<link rel="stylesheet" href="{% static 'css/base.css' %}">
    {% block css_extra %}{% endblock %}
</head>
<body>
    <header class="site-header">
        <div class="logo-area">
            <div class="logo-icon">♪</div>
            <span class="logo-text">PlaylistHub</span>
        </div>

        <nav class="site-nav">
            <a href="{% url 'homepage' %}" class="nav-link">Início</a>

            {% if user.is_authenticated %}
                <a href="{% url 'listar_musicas' %}" class="nav-link">Músicas</a>
                <a href="{% url 'perfil' %}" class="nav-link">Perfil</a>
                <a href="{% url 'sec-password_change' %}" class="nav-link">Trocar senha</a>
            {% else %}
                <a href="{% url 'login' %}" class="nav-link">Login</a>
                <a href="{% url 'cadastro' %}" class="nav-link">Criar conta</a>
            {% endif %}
        </nav>
    </header>

    <main>
        {% block conteudo %}{% endblock %}
    </main>
</body>
</html>
